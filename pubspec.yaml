name: moodtunes_ai
description: "A premium offline mood-based music player."
publish_to: 'none'

version: 1.2.0+120

environment:
  sdk: ^3.12.2

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  provider: ^6.1.2
  shared_preferences: ^2.2.3
  url_launcher: ^6.3.0
  google_fonts: ^6.2.1
  flutter_animate: ^4.5.0
  animated_text_kit: ^4.2.2
  lottie: ^3.1.2
  just_audio: ^0.9.42
  just_audio_background: ^0.0.1-beta.15
  audio_session: ^0.1.21
  audio_service: ^0.18.12
  rxdart: ^0.28.0
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  file_picker: ^8.0.0+1
  permission_handler: ^11.3.1
  on_audio_query: ^2.9.0
  path_provider: ^2.1.3
  palette_generator: ^0.3.3+3
  cached_network_image: ^3.3.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/data/
    - assets/music/happy/
    - assets/music/sad/
    - assets/music/relax/
    - assets/music/workout/
    - assets/music/study/
    - assets/music/sleep/
    - assets/music/romantic/
    - assets/music/lonely/
    - assets/covers/happy/
    - assets/covers/sad/
    - assets/covers/relax/
    - assets/covers/workout/
    - assets/covers/study/
    - assets/covers/sleep/
    - assets/covers/romantic/
    - assets/covers/lonely/
